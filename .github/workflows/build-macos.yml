name: Build macOS App

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  XCODE_VERSION: '26.5'
  MACOS_VERSION: '26'

jobs:
  build:
    name: Build macOS App
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Build Go core-engine
        run: |
          cd core-engine
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o core-engine main.go
          ls -lh core-engine
          file core-engine

      # - name: Verify Go binary
      #   run: |
      #     ./core-engine/core-engine --version || true
      #     ./core-engine/core-engine -help || true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build macOS App (Release)
        run: |
          cd macos-app
          xcodebuild \
            -scheme DBOtter \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Locate built app
        run: |
          find macos-app/build -name "DBOtter.app" -type d
          APP_PATH=$(find macos-app/build -name "DBOtter.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Verify app bundle
        run: |
          ls -la "$APP_PATH"
          ls -la "$APP_PATH/Contents/MacOS/"
          file "$APP_PATH/Contents/MacOS/DBOtter"
          # Verify Go binary is embedded
          if [ -f "$APP_PATH/Contents/MacOS/core-engine" ]; then
            echo "✅ Go binary found in app bundle"
            file "$APP_PATH/Contents/MacOS/core-engine"
          else
            echo "⚠️ Go binary NOT found in app bundle"
            find "$APP_PATH" -name "core-engine" -type f
          fi

      - name: Create DMG (optional)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd macos-app
          APP_PATH=$(find build -name "DBOtter.app" -type d | head -1)
          VERSION=${GITHUB_REF_NAME#v}
          DMG_NAME="DBOtter-${VERSION}-macOS-arm64.dmg"
          hdiutil create -volname "DBOtter" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
          echo "DMG_PATH=$PWD/$DMG_NAME" >> $GITHUB_ENV

      - name: Upload macOS App artifact
        uses: actions/upload-artifact@v4
        with:
          name: DBOtter-macOS-arm64
          path: ${{ env.APP_PATH }}
          retention-days: 30

      - name: Upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: DBOtter-DMG
          path: ${{ env.DMG_PATH }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/DBOtter-macOS-arm64/DBOtter.app/**
            artifacts/DBOtter-DMG/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false